<!DOCTYPE html>

    <head>
        <meta charset="UTF-8" />

        <link rel="stylesheet" href="./style.css" />
        <title>React Working</title>
    </head>
    <body>
        <!-- <h1>above root div</h1> -->
        <div id="root">
            <h1>This will be replaced</h1>
            <!-- all the content we add here will be replaced by the content rendered by react -->
        </div>
        <!-- <h1>below root div</h1> -->
        <!-- react is only concerned about the div with id="root" 
             (because we are using reactDOM's render method on root)
             anything above or below this div with id="root" will be rendered normally as HTML

             this why react is called a library not a framework
             it is up to us where we use react, we can use it only in header, footer or in whole app
             react can work independently in a small portion of our app
             we can also use react with an existing application
        -->

        <!-- <div id="root2"></div> -->

            root.appendChild(heading);
        </script> -->

        <!-- order of these script tags are always in sequence, 
             so if we add our custom stript before react cdn scripts then the code will not work
        -->
